<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafeHer AI — Safe Route Planner · Vijayawada</title>
  <meta name="description" content="SafeHer AI helps women navigate Vijayawada safely by computing shortest routes and highlighting nearby police stations, hospitals, and pharmacies." />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ─── Reset & tokens ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:       #7C3AED;
      --brand-light: #A78BFA;
      --brand-dark:  #5B21B6;
      --surface:     rgba(15, 12, 30, 0.82);
      --surface-hi:  rgba(30, 24, 55, 0.92);
      --text:        #F3F0FF;
      --text-muted:  #C4B5FD;
      --police:      #1565C0;
      --hospital:    #C62828;
      --pharmacy:    #2E7D32;
      --route:       #38BDF8;
      --shadow:      0 8px 32px rgba(0,0,0,0.45);
      --radius:      14px;
      --transition:  0.22s cubic-bezier(.4,0,.2,1);
    }

    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; }

    body {
      background: #0d0b1e;
      color: var(--text);
      overflow: hidden;
    }

    /* ─── Map ────────────────────────────────────────────────────── */
    #map {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    /* ─── Top instruction bar ────────────────────────────────────── */
    #instruction-bar {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: var(--surface-hi);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(167,139,250,0.25);
      border-radius: 50px;
      padding: 10px 24px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.02em;
      box-shadow: var(--shadow);
      white-space: nowrap;
      transition: background var(--transition), color var(--transition);
      pointer-events: none;
      user-select: none;
    }

    #instruction-bar.routing {
      color: var(--brand-light);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.55; }
    }

    /* ─── Header card (top-left) ─────────────────────────────────── */
    #header-card {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 1000;
      background: var(--surface-hi);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(167,139,250,0.22);
      border-radius: var(--radius);
      padding: 14px 18px;
      box-shadow: var(--shadow);
      min-width: 180px;
    }

    #header-card h1 {
      font-size: 1.05rem;
      font-weight: 700;
      background: linear-gradient(135deg, #A78BFA, #60A5FA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      margin-bottom: 3px;
    }

    #header-card p {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* ─── Legend card (top-right) ─────────────────────────────────── */
    #legend-card {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 1000;
      background: var(--surface-hi);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(167,139,250,0.22);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }

    #legend-card h2 {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 7px;
      font-size: 0.78rem;
      color: var(--text);
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.6);
      flex-shrink: 0;
    }

    .legend-route {
      width: 24px;
      height: 4px;
      border-radius: 2px;
      background: var(--route);
      flex-shrink: 0;
    }

    /* ─── Summary panel (bottom-left) ───────────────────────────── */
    #summary-panel {
      position: absolute;
      bottom: 34px;
      left: 18px;
      z-index: 1000;
      background: var(--surface-hi);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(167,139,250,0.22);
      border-radius: var(--radius);
      padding: 16px 20px;
      box-shadow: var(--shadow);
      min-width: 220px;
      display: none;        /* hidden until route drawn */
      transition: opacity var(--transition), transform var(--transition);
      opacity: 0;
      transform: translateY(10px);
    }

    #summary-panel.visible {
      display: block;
      opacity: 1;
      transform: translateY(0);
      animation: slideUp var(--transition) forwards;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #summary-panel h2 {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.82rem;
    }

    .stat-label {
      color: var(--text-muted);
      font-weight: 400;
    }

    .stat-value {
      font-weight: 600;
      color: var(--text);
    }

    .stat-divider {
      border: none;
      border-top: 1px solid rgba(167,139,250,0.15);
      margin: 10px 0;
    }

    /* ─── Error toast ────────────────────────────────────────────── */
    #error-toast {
      position: absolute;
      bottom: 34px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      z-index: 1100;
      background: rgba(185,28,28,0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(239,68,68,0.4);
      border-radius: 50px;
      padding: 10px 22px;
      font-size: 0.82rem;
      font-weight: 500;
      color: #FEE2E2;
      box-shadow: var(--shadow);
      transition: transform var(--transition), opacity var(--transition);
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
    }

    #error-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ─── Leaflet overrides ──────────────────────────────────────── */
    .leaflet-control-attribution {
      background: rgba(15,12,30,0.7) !important;
      color: #9CA3AF !important;
      font-size: 0.65rem !important;
    }

    .leaflet-control-attribution a { color: #A78BFA !important; }

    .leaflet-control-zoom a {
      background: var(--surface-hi) !important;
      color: var(--text-muted) !important;
      border-color: rgba(167,139,250,0.25) !important;
    }

    .leaflet-control-zoom a:hover {
      background: var(--brand-dark) !important;
      color: #fff !important;
    }

    /* ─── Custom marker icons ─────────────────────────────────────── */
    .marker-pin {
      width: 16px;
      height: 16px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.45);
    }

    .marker-pin.start { background: #22C55E; }
    .marker-pin.end   { background: #EF4444; }
  </style>
</head>
<body>

<!-- ── Map container ─────────────────────────────────────────────── -->
<div id="map"></div>

<!-- ── Header (brand) ────────────────────────────────────────────── -->
<div id="header-card" aria-label="SafeHer AI branding">
  <h1>SafeHer AI</h1>
  <p>Safe Route Planner · Vijayawada</p>
</div>

<!-- ── Instruction bar ───────────────────────────────────────────── -->
<div id="instruction-bar" role="status" aria-live="polite">
  Click to set start point
</div>

<!-- ── Legend ────────────────────────────────────────────────────── -->
<div id="legend-card" aria-label="Map legend">
  <h2>Legend</h2>
  <div class="legend-item">
    <div class="legend-route"></div>
    <span>Safe route</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#1565C0"></div>
    <span>Police station</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#C62828"></div>
    <span>Hospital</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#2E7D32"></div>
    <span>Pharmacy</span>
  </div>
</div>

<!-- ── Route summary panel ───────────────────────────────────────── -->
<div id="summary-panel" role="region" aria-label="Route summary">
  <h2>Route Summary</h2>
  <div class="stat-row">
    <span class="stat-label">Distance</span>
    <span class="stat-value" id="stat-distance">—</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Nodes traversed</span>
    <span class="stat-value" id="stat-nodes">—</span>
  </div>
  <hr class="stat-divider" />
  <div class="stat-row">
    <span class="stat-label">Safe havens nearby</span>
    <span class="stat-value" id="stat-havens">—</span>
  </div>
</div>

<!-- ── Error toast ───────────────────────────────────────────────── -->
<div id="error-toast" role="alert"></div>

<script>
// ════════════════════════════════════════════════════════════════════
//  SafeHer AI — Milestone 3 map frontend
// ════════════════════════════════════════════════════════════════════

// ── DOM refs ─────────────────────────────────────────────────────
const instructionBar = document.getElementById('instruction-bar');
const summaryPanel   = document.getElementById('summary-panel');
const statDistance   = document.getElementById('stat-distance');
const statNodes      = document.getElementById('stat-nodes');
const statHavens     = document.getElementById('stat-havens');
const errorToast     = document.getElementById('error-toast');

// ── State ─────────────────────────────────────────────────────────
let clickState = 0;   // 0 = awaiting start, 1 = awaiting end, 2 = done
let startLatLng = null;
let endLatLng   = null;
let startMarker = null;
let endMarker   = null;
let routeLayer  = null;
let havenLayers = [];
let isRouting   = false;

// ── Safe-haven colour map ─────────────────────────────────────────
const HAVEN_COLORS = {
  police:   '#1565C0',
  hospital: '#C62828',
  pharmacy: '#2E7D32',
};

// ─────────────────────────────────────────────────────────────────
//  Map initialisation
// ─────────────────────────────────────────────────────────────────
const map = L.map('map', {
  center:    [16.5062, 80.6480],
  zoom:      14,
  zoomControl: true,
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19,
}).addTo(map);

// ─────────────────────────────────────────────────────────────────
//  Custom pin icons
// ─────────────────────────────────────────────────────────────────
function makePinIcon(type) {
  return L.divIcon({
    className: '',
    html: `<div class="marker-pin ${type}"></div>`,
    iconSize:   [16, 16],
    iconAnchor: [8, 16],
    popupAnchor:[0, -18],
  });
}

// ─────────────────────────────────────────────────────────────────
//  UI helpers
// ─────────────────────────────────────────────────────────────────
function setInstruction(text, routing = false) {
  instructionBar.textContent = text;
  instructionBar.classList.toggle('routing', routing);
}

function showError(msg) {
  errorToast.textContent = msg;
  errorToast.classList.add('show');
  setTimeout(() => errorToast.classList.remove('show'), 3800);
}

function showSummary(distance, nodes, havenCount) {
  statDistance.textContent = distance.toLocaleString() + ' m';
  statNodes.textContent    = nodes;
  statHavens.textContent   = havenCount;
  summaryPanel.style.display = 'block';
  // Trigger animation on next frame
  requestAnimationFrame(() => summaryPanel.classList.add('visible'));
}

function hideSummary() {
  summaryPanel.classList.remove('visible');
  summaryPanel.style.display = 'none';
  statDistance.textContent = '—';
  statNodes.textContent    = '—';
  statHavens.textContent   = '—';
}

// ─────────────────────────────────────────────────────────────────
//  Clear all drawn layers
// ─────────────────────────────────────────────────────────────────
function clearAll() {
  if (startMarker) { map.removeLayer(startMarker); startMarker = null; }
  if (endMarker)   { map.removeLayer(endMarker);   endMarker   = null; }
  if (routeLayer)  { map.removeLayer(routeLayer);  routeLayer  = null; }
  havenLayers.forEach(l => map.removeLayer(l));
  havenLayers = [];
  hideSummary();
}

// ─────────────────────────────────────────────────────────────────
//  Safe-haven circle markers
// ─────────────────────────────────────────────────────────────────
function drawSafeHavens(havens) {
  havens.forEach(h => {
    const color = HAVEN_COLORS[h.category] || '#888';
    const label = h.name || 'Unnamed';
    const circle = L.circleMarker([h.latitude, h.longitude], {
      radius:      8,
      fillColor:   color,
      fillOpacity: 0.85,
      color:       '#ffffff',
      weight:      2,
    })
    .bindPopup(`<b>${label}</b><br>${h.category}`)
    .addTo(map);
    havenLayers.push(circle);
  });
}

// ─────────────────────────────────────────────────────────────────
//  Fetch route and render
// ─────────────────────────────────────────────────────────────────
async function fetchRoute(start, end) {
  isRouting = true;
  setInstruction('Routing…', true);

  try {
    const response = await fetch('/api/route', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        start_lat: start.lat,
        start_lon: start.lng,
        end_lat:   end.lat,
        end_lon:   end.lng,
      }),
    });

    const data = await response.json();

    if (!response.ok) {
      const msg = data.error || `Server error (${response.status})`;
      showError(msg);
      setInstruction('Click to plan a new route');
      return;
    }

    // ── Draw route polyline ───────────────────────────────────────
    const coords = data.geojson?.geometry?.coordinates || [];
    if (coords.length > 0) {
      const latLngs = coords.map(([lon, lat]) => [lat, lon]);
      routeLayer = L.polyline(latLngs, {
        color:   '#38BDF8',
        weight:  5,
        opacity: 0.8,
        lineCap: 'round',
        lineJoin:'round',
      }).addTo(map);

      // Fit map to route bounds
      map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });
    }

    // ── Draw safe havens ──────────────────────────────────────────
    const havens = data.nearby_safe_havens || [];
    drawSafeHavens(havens);

    // ── Update summary panel ──────────────────────────────────────
    showSummary(data.distance_meters, data.node_count, havens.length);
    setInstruction('Click to plan a new route');

  } catch (err) {
    showError('Network error — is the server running?');
    setInstruction('Click to plan a new route');
    console.error('Route fetch error:', err);
  } finally {
    isRouting = false;
  }
}

// ─────────────────────────────────────────────────────────────────
//  Map click — state machine
// ─────────────────────────────────────────────────────────────────
map.on('click', (e) => {
  if (isRouting) return;   // ignore clicks while fetching

  const { lat, lng } = e.latlng;

  if (clickState === 0) {
    // ── Set start ──────────────────────────────────────────────
    clearAll();
    startLatLng = e.latlng;
    startMarker = L.marker([lat, lng], { icon: makePinIcon('start') })
      .bindTooltip('Start', { permanent: false })
      .addTo(map);
    clickState = 1;
    setInstruction('Click to set destination');

  } else if (clickState === 1) {
    // ── Set end → trigger route ────────────────────────────────
    endLatLng = e.latlng;
    endMarker = L.marker([lat, lng], { icon: makePinIcon('end') })
      .bindTooltip('Destination', { permanent: false })
      .addTo(map);
    clickState = 2;
    fetchRoute(startLatLng, endLatLng);

  } else {
    // ── Reset → new start ──────────────────────────────────────
    clearAll();
    startLatLng = e.latlng;
    startMarker = L.marker([lat, lng], { icon: makePinIcon('start') })
      .bindTooltip('Start', { permanent: false })
      .addTo(map);
    clickState = 1;
    setInstruction('Click to set destination');
  }
});
</script>
</body>
</html>
