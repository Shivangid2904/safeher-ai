<!DOCTYPE html>
<html>
<head>
    <title>SafeHer AI Interactive Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        #map {
            height: 100vh;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // Create map
    var map = L.map('map').setView([16.5062, 80.6480], 13);

    // Add map tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // Click event
    map.on('click', function(e) {

    var lat = e.latlng.lat;
    var lng = e.latlng.lng;

    // RANDOM realistic inputs
    var hour = Math.floor(Math.random() * 24);
    var crime_score = Math.random().toFixed(2);
    var crowd_density = Math.random().toFixed(2);

    console.log("Inputs:", lat, lng, hour, crime_score, crowd_density);

    var data = {
        lat: lat,
        long: lng,
        hour: hour,
        crime_score: parseFloat(crime_score),
        crowd_density: parseFloat(crowd_density)
    };

    fetch('http://127.0.0.1:5000/predict_risk', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(result => {

        L.popup()
            .setLatLng([lat, lng])
            .setContent(
                `<b>Risk Level:</b> ${result.level}<br>
                 <b>Risk Score:</b> ${result.risk_score}<br><br>
                 <b>Hour:</b> ${hour}<br>
                 <b>Crime:</b> ${crime_score}<br>
                 <b>Crowd:</b> ${crowd_density}`
            )
            .openOn(map);
    });
});
</script>

</body>
</html>
